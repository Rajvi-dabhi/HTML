<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>inline elements</title>
    </head>
    <body>

        <!-- inline elements -->

        <!-- inline elements take space has per its need and do not start with new line -->

        <!-- italic tag -->
        <i>nature</i>
        <br />

        <!-- bold tag -->
         <b>nature</b>
         <br />

         <!-- underline tag -->
          <u>nature</u>
          <br />

          <em>nature</em>
          <br />

          <strong>nature</strong>
          <br />
    </body>
</html>
