<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>table 8</title>

        <style>
            table,
            th,
            tr,
            td {
                border: 2px solid black;
            }
        </style>
    </head>
    <body>
        <table>
            <thead>
                <tr>
                    <th rowspan="2">Day</th>
                    <th colspan="2">Session</th>
                </tr>

                <tr>
                    <th>Schedule</th>
                    <th>Course name</th>
                </tr>

                <tr>
                    <td>Monday</td>
                    <td>11:00-1:00</td>
                    <td>Web Technology</td>
                </tr>

                <tr>
                    <td>saturday</td>
                    <td>2:00-4:00</td>
                    <td>Network Management</td>
                </tr>

                <tr>
                    <td>Sunday</td>
                    <td>5:00-7:00</td>
                    <td>IT project Management</td>
                </tr>
            </thead>
        </table>
    </body>
</html>
