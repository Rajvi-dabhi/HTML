<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Table 4</title>

        <style>
            table,
            th,
            tr,
            td {
                border: 2px solid black;
            }
        </style>
    </head>
    <body>
        <table>
        <thead>
            <tr>
                <th colspan="2">Veggies</th>
                <th colspan="2">Fruits</th>
                <th></th>
            </tr>

            <tr>
                <td colspan="2">Yellow pepper</td>
                <td rowspan="2">Banana</td>
                <td rowspan="2">Orange</td>
                <th rowspan="3">Yellow</th>
            </tr>

            <tr>
                <td colspan="2">Yellow Zucchini</td>
            </tr>

            <tr>
                <td>pumpkin</td>
                <td>Corn</td>
                <td colspan="2">Pineapple</td>
            </tr>

            <tr>
                <td colspan="2">Red Pepper</td>
                <td rowspan="2">Strawberry</td>
                <td rowspan="2">Watermelon</td>
                <td rowspan="3">Red</td>
            </tr>

            <tr>
                <td>Beet</td>
                <td>Tomato</td>
            </tr>

            <tr>
                <td colspan="2">Radishes</td>
                <td colspan="2">Cherries</td>
            </tr>
        </thead>
        </table>
    </body>
</html>
