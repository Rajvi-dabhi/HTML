<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Block elements</title>
    </head>
    <body>
        <!-- block elements -->

        <!-- block elements will occupy full width and always start with new line -->

        <!-- heading tags -->

        <h1>Theme-1</h1>
        <h2>Theme-2</h2>
        <h3>Theme-3</h3>
        <h4>Theme-4</h4>
        <h5>Theme-5</h5>
        <h6>Theme-6</h6>

        <p>This is a paragraph</p>

        <!-- Horizontal line -->
         <hr />

         <!-- break line -->
          <br />

          <!-- list types -->

          <!-- order list -->
           <ol>
            <li>list-1</li>
            <li>list-2</li>
            <li>list-3</li>
            <li>list-4</li>
            <li>list-5</li>
           </ol>

           <!-- un order list -->
            <ul>
                <li>list-1</li>
                <li>list-2</li>
                <li>list-3</li>
                <li>list-4</li>
                <li>list-5</li>
            </ul>

            <!-- description list -->
             <dl>
                <dt>Fruits</dt>
                <dd>Cherry</dd>
                <dd>Orange</dd>
                <dd>Mango</dd>
                <dd>Grapes</dd>
             </dl>
    </body>
</html>
