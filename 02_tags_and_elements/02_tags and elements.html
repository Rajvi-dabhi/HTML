<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tags and Elements</title>
        </head>
        <body>

            <!-- tags -->

            <h1></h1>
            <P></P>

            <!-- Elements -->

            <h1>World</h1>
            <P>This is my first paragraph</P>

            <input type="text" />
            <input type="number" />


        </body>
</html>
