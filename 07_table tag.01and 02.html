<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Table tag</title>

        <style>
            table,
            th,
            tr,
            td {
                border: 1px solid black;
            }
            </style>
    </head>
    <body>
        <thead>
            <table>
                <tr>
                    <th>Product</th>
                    <th>Flavors</th>
                </tr>

                <tr> 
                    <td rowspan="3">Milk</td>
                    <td>Mango</td>
                </tr>

                <tr>
                    <td>Chocolate</td>
                </tr>

                <tr>
                    <td>Almond</td>
                </tr>

                <tr>
                    <td colspan="2">These are exclusive flavors</td>
                </tr>
            </table>
        </thead>
    </body>
</html>
